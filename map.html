<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live GPS Tracker</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC3reJ1SJkqXTr1Zriadsu6bchWADNfaZs"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(rgba(0,90,40,.6),rgba(0,90,40,.8)),
    url(https://images.unsplash.com/photo-1501004318641-b39e6451bec6);
  background-size:cover;
  color:#fff;
  padding:14px;
}

.container{width:100%;max-width:900px;}

.card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:14px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

#map{
  height:400px;
  width:100%;
  border-radius:14px;
  display:none;
}

#status{
  text-align:center;
  font-weight:600;
  padding:20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.back{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="top">
    <h3>🌍 Live GPS Path</h3>
    <button class="back" onclick="location.href='index.html'">⬅ Back</button>
  </div>

  <div class="card">
    <div id="status">📡 Waiting for GPS signal...</div>
    <div id="map"></div>
  </div>

</div>

<script>

// ================= SMOOTHING + FILTER =================

let smoothBuffer = [];
const SMOOTH_SIZE = 5;

let lastPoint = null;
const MIN_DISTANCE = 3; // meters

function getSmoothedPoint(p){
  smoothBuffer.push(p);

  if(smoothBuffer.length > SMOOTH_SIZE){
    smoothBuffer.shift();
  }

  let avgLat = 0, avgLng = 0;

  smoothBuffer.forEach(pt=>{
    avgLat += pt.lat;
    avgLng += pt.lng;
  });

  return {
    lat: avgLat / smoothBuffer.length,
    lng: avgLng / smoothBuffer.length
  };
}

function getDistance(p1, p2){
  const R = 6371000;

  const dLat = (p2.lat - p1.lat) * Math.PI/180;
  const dLng = (p2.lng - p1.lng) * Math.PI/180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(p1.lat*Math.PI/180) * Math.cos(p2.lat*Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// ================= MAP =================

let map, marker, polyline;
let path = [];
let mapInitialized = false;

function initMap(start){

  document.getElementById("map").style.display = "block";

  map = new google.maps.Map(document.getElementById("map"),{
    zoom:16,
    center:start
  });

  marker = new google.maps.Marker({
    position:start,
    map:map
  });

  polyline = new google.maps.Polyline({
    path:path,
    map:map,
    strokeColor:"#00ff88",
    strokeWeight:4
  });
}

// ================= MQTT =================

const options = {
  username: "agribot",
  password: "Agribot123"
};

const client = mqtt.connect("wss://93482c172cb3465898cde100a0b26b0d.s1.eu.hivemq.cloud:8884/mqtt", options);

client.on("connect", function () {
  client.subscribe("agriBot/gps");
});

client.on("message", function (topic, message) {

  let data = JSON.parse(message.toString());

  if(topic === "agriBot/gps"){

      // 🚫 Validate GPS data
      if(!data.lat || !data.lng) return;
      if(data.lat === 0 || data.lng === 0) return;
      if(data.lat < -90 || data.lat > 90) return;
      if(data.lng < -180 || data.lng > 180) return;

      const rawPoint = {lat: data.lat, lng: data.lng};

      // ✅ Smooth GPS
      const p = getSmoothedPoint(rawPoint);

      // ✅ Initialize map only once
      if(!mapInitialized){
          initMap(p);
          mapInitialized = true;
          document.getElementById("status").innerText = "✅ GPS Connected";
      }

      // ✅ Filter jitter
      if(lastPoint){
          let dist = getDistance(lastPoint, p);
          if(dist < MIN_DISTANCE) return;
      }

      lastPoint = p;

      // ✅ Update map
      path.push(p);
      polyline.setPath(path);
      marker.setPosition(p);
      map.panTo(p);
  }
});

</script>

</body>
</html>
